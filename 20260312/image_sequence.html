    <head>
        <title>Image Sequence Viewer</title>
        <script>
    var aniFrames = new Array(50);
    var imageFiles = ['260312T000820_dif.jpg', '260312T000832_dif.jpg', '260312T000844_dif.jpg', '260312T000856_dif.jpg', '260312T000908_dif.jpg', '260312T000920_dif.jpg', '260312T000932_dif.jpg', '260312T000944_dif.jpg', '260312T000957_dif.jpg', '260312T001009_dif.jpg', '260312T001021_dif.jpg', '260312T001033_dif.jpg', '260312T001045_dif.jpg', '260312T001057_dif.jpg', '260312T001109_dif.jpg', '260312T001121_dif.jpg', '260312T001133_dif.jpg', '260312T001145_dif.jpg', '260312T001157_dif.jpg', '260312T001209_dif.jpg', '260312T001221_dif.jpg', '260312T001233_dif.jpg', '260312T001245_dif.jpg', '260312T001257_dif.jpg', '260312T001309_dif.jpg', '260312T001321_dif.jpg', '260312T001333_dif.jpg', '260312T001345_dif.jpg', '260312T001357_dif.jpg', '260312T001409_dif.jpg', '260312T001421_dif.jpg', '260312T001433_dif.jpg', '260312T001445_dif.jpg', '260312T001457_dif.jpg', '260312T001509_dif.jpg', '260312T001521_dif.jpg', '260312T001533_dif.jpg', '260312T001545_dif.jpg', '260312T001557_dif.jpg', '260312T001609_dif.jpg', '260312T001621_dif.jpg', '260312T001633_dif.jpg', '260312T001645_dif.jpg', '260312T001657_dif.jpg', '260312T001709_dif.jpg', '260312T001721_dif.jpg', '260312T001733_dif.jpg', '260312T001745_dif.jpg', '260312T001757_dif.jpg', '260312T001809_dif.jpg'];
    var imageNames = ['260312T000820_dif.jpg', '260312T000832_dif.jpg', '260312T000844_dif.jpg', '260312T000856_dif.jpg', '260312T000908_dif.jpg', '260312T000920_dif.jpg', '260312T000932_dif.jpg', '260312T000944_dif.jpg', '260312T000957_dif.jpg', '260312T001009_dif.jpg', '260312T001021_dif.jpg', '260312T001033_dif.jpg', '260312T001045_dif.jpg', '260312T001057_dif.jpg', '260312T001109_dif.jpg', '260312T001121_dif.jpg', '260312T001133_dif.jpg', '260312T001145_dif.jpg', '260312T001157_dif.jpg', '260312T001209_dif.jpg', '260312T001221_dif.jpg', '260312T001233_dif.jpg', '260312T001245_dif.jpg', '260312T001257_dif.jpg', '260312T001309_dif.jpg', '260312T001321_dif.jpg', '260312T001333_dif.jpg', '260312T001345_dif.jpg', '260312T001357_dif.jpg', '260312T001409_dif.jpg', '260312T001421_dif.jpg', '260312T001433_dif.jpg', '260312T001445_dif.jpg', '260312T001457_dif.jpg', '260312T001509_dif.jpg', '260312T001521_dif.jpg', '260312T001533_dif.jpg', '260312T001545_dif.jpg', '260312T001557_dif.jpg', '260312T001609_dif.jpg', '260312T001621_dif.jpg', '260312T001633_dif.jpg', '260312T001645_dif.jpg', '260312T001657_dif.jpg', '260312T001709_dif.jpg', '260312T001721_dif.jpg', '260312T001733_dif.jpg', '260312T001745_dif.jpg', '260312T001757_dif.jpg', '260312T001809_dif.jpg'];
    var frameNum = 0;
    var maxFrameNum = 50 - 1;
    var timeout_id = null;
    var delay = 100; // Milliseconds

    function showFrame() {
        document.imageWindow.src = aniFrames[frameNum].src;
        updateStatusDisplay();
    }

    function animate() {
        frameNum++;
        if (frameNum > maxFrameNum) frameNum = 0; // Loop animation
        showFrame();
        timeout_id = setTimeout(animate, delay);
    }

    function startAnimate() {
        if (timeout_id) return; // Already running
        animate();
    }

    function killAnimate(){
        if (timeout_id) clearTimeout(timeout_id);
        timeout_id = null;
    }

    function stepNext() {
        killAnimate();
        frameNum++;
        if (frameNum > maxFrameNum) frameNum = 0;
        showFrame();
    }

    function stepPrev() {
        killAnimate();
        frameNum--;
        if (frameNum < 0) frameNum = maxFrameNum;
        showFrame();
    }

    function speedUp() {
        delay = Math.max(10, delay - 20); // Decrease delay (faster)
        updateSpeedDisplay();
    }

    function slowDown() {
        delay = delay + 20; // Increase delay (slower)
        updateSpeedDisplay();
    }
    
    function updateSpeedDisplay() {
        // Combined with frame counter status
        updateStatusDisplay();
    }
    
    // Keyboard Shortcuts
    document.addEventListener('keydown', function(event) {
        // Only run if the active element is NOT an input or textarea
        if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;

        if (event.key === "ArrowRight") {
            stepNext();
        } else if (event.key === "ArrowLeft") {
            stepPrev();
        } else if (event.key === " ") { // Spacebar
            event.preventDefault(); // Prevent scrolling
            if (timeout_id) {
                killAnimate();
            } else {
                startAnimate();
            }
        }
    });
    
    function updateStatusDisplay() {
        var counter = document.getElementById('frameCounter');
        if (counter) {
            counter.innerHTML = "50 frames (" + delay + "ms), " + (frameNum + 1) + "/" + 50;
        }
    }


    function changeZoom(val) {
        // val is from range input (absolute value)
        var img = document.getElementsByName('imageWindow')[0];
        if (img) {
            img.style.width = val + '%';
            
            var label = document.getElementById('zoomDisplay');
            if (label) {
                label.innerHTML = val + '%';
            }
        }
    }

    function resetZoom() {
        var img = document.getElementsByName('imageWindow')[0];
        if (img) {
            img.style.width = '100%';
        }
        var slider = document.getElementById('zoomSlider');
        if (slider) {
            slider.value = 100;
        }
        var label = document.getElementById('zoomDisplay');
        if (label) {
            label.innerHTML = '100%';
        }
    }

    function reloadPage() {
        window.location.reload();
    }
    
    function getTimeFromFilename(fname) {
        // Assumes format YYMMDDTHHMMSS...
        var match = fname.match(/T(\d{2})(\d{2})(\d{2})/);
        if (match) {
            return match[1] + ":" + match[2] + ":" + match[3];
        }
        // Fallback for HHMM
        match = fname.match(/T(\d{2})(\d{2})/);
        if (match) {
            return match[1] + ":" + match[2] + ":00";
        }
        return "";
    }

    function setTime(btn) {
        // Find input in previous sibling or parent cell
        var input = btn.previousElementSibling;
        if (!input || input.tagName !== 'INPUT') {
            // Try parent
            input = btn.parentNode.querySelector('input');
        }
        if (input) {
            // Get current time from current frame
            var currentFname = imageNames[frameNum];
            var timeStr = getTimeFromFilename(currentFname);
            if (timeStr) {
                input.value = timeStr;
                saveData();
            } else {
                alert("Could not parse time from filename: " + currentFname);
            }
        }
    }
    
    function setFlatFrameTime() {
        var currentFname = imageNames[frameNum];
        // Looking for YYMMDDTHHMMSS... format
        // Example: T1_260312T040003.png -> 260312T040003
        var match = currentFname.match(/(\d{6}T\d{6})/);
        if (match) {
             document.getElementById('flatFrame').value = match[1];
             saveObserver();
        } else {
             // Fallback: try just the base name without extension
             var base = currentFname.split('.').slice(0, -1).join('.');
             document.getElementById('flatFrame').value = base;
             saveObserver();
        }
    }

    function addLogEntry() {
        var table = document.getElementById('logTable').getElementsByTagName('tbody')[0];

        var newRow = table.insertRow();
        var cell1 = newRow.insertCell(0);
        var cell2 = newRow.insertCell(1);
        var cell3 = newRow.insertCell(2);
        var cell4 = newRow.insertCell(3);
        var cell5 = newRow.insertCell(4);
        var cell6 = newRow.insertCell(5);
        var cell7 = newRow.insertCell(6);
        var cell8 = newRow.insertCell(7);

        // Event Type
        var eventOpts = ["Doppler shift", "Ejection", "Filament activity", "Filament disapearance", "Filament eruption", "Flare", "H-alpha brightening", "Prominence activity", "Prominence eruption"];
        var eventSelect = '<select onchange="saveData()" style="font-size: 0.9em;"><option value="">Select...</option>';
        for (var j = 0; j < eventOpts.length; j++) {
            eventSelect += '<option value="' + eventOpts[j] + '">' + eventOpts[j] + '</option>';
        }
        eventSelect += '</select>';
        cell1.innerHTML = eventSelect;
        
        // Start time
        cell2.innerHTML = '<input type="text" placeholder="Start time" style="width:70px; font-size: 0.9em;" oninput="saveData()"> <button onclick="setTime(this)" style="font-size:0.8em; padding:2px;">Set</button>';
        
        // End time
        cell3.innerHTML = '<input type="text" placeholder="End time" style="width:70px; font-size: 0.9em;" oninput="saveData()"> <button onclick="setTime(this)" style="font-size:0.8em; padding:2px;">Set</button>';

        // Event sequence
        var seqOpts = [
            {val: "B", text: "Before (B)"},
            {val: "F", text: "Full (F)"},
            {val: "A", text: "After (A)"},
            {val: "BI", text: "Before interm. (BI)"},
            {val: "FI", text: "Full interm. (FI)"},
            {val: "IA", text: "Interm. after (IA)"},
            {val: "BA", text: "Befor after (BA)"},
            {val: "BIA", text: "Before interm. after (BIA)"}
        ];
        // Sort explicitly not needed as requested alphabetical order is roughly the order provided, or should I sort by text? 
        // "Add the following list (in alphabetical order)"
        // The list provided: Before (B), Full (F), After (A)... 
        // Alphabetical by text:
        // After (A)
        // Befor after (BA)
        // Before (B)
        // Before interm. (BI)
        // Before interm. after (BIA)
        // Full (F)
        // Full interm. (FI)
        // Interm. after (IA)
        
        var seqOptsSorted = [
            {val: "A", text: "After (A)"},
            {val: "BA", text: "Befor after (BA)"},
            {val: "B", text: "Before (B)"},
            {val: "BI", text: "Before interm. (BI)"},
            {val: "BIA", text: "Before interm. after (BIA)"},
            {val: "F", text: "Full (F)"},
            {val: "FI", text: "Full interm. (FI)"},
            {val: "IA", text: "Interm. after (IA)"}
        ];

        var seqSelect = '<select onchange="saveData()" style="font-size: 0.9em; width: 100%;"><option value="">Select...</option>';
        for (var k = 0; k < seqOptsSorted.length; k++) {
            seqSelect += '<option value="' + seqOptsSorted[k].val + '">' + seqOptsSorted[k].text + '</option>';
        }
        seqSelect += '</select>';
        cell4.innerHTML = seqSelect;
        
        // High Speed
        cell5.innerHTML = '<select onchange="saveData()" style="font-size: 0.9em;"><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select>';

        // Location
        cell6.innerHTML = '<input type="text" placeholder="Loc" style="width:100%; font-size: 0.9em;" oninput="saveData()">';

        // T1 Event (Notes)
        cell7.innerHTML = '<input type="text" placeholder="Enter T1 event..." style="width:100%; font-size: 0.9em;" oninput="saveData()">';

        // Action
        cell8.innerHTML = '<button onclick="deleteRow(this)" style="font-size: 0.9em;">Delete</button>';
        
        saveData();
    }

    function deleteRow(btn) {
        var row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
        saveData();
    }

    function saveObserver() {
        var name = document.getElementById('observerName').value;
        var flat = document.getElementById('flatFrame').value;
        try {
            localStorage.setItem('T1_check_ObserverName', name);
            localStorage.setItem('T1_check_FlatFrame', flat);
        } catch (e) {
            console.warn("LocalStorage not available for Observer:", e);
        }
    }

    function saveData() {
        var table = document.getElementById('logTable');
        var rows = table.rows;
        var data = [];
        // Skip header (row 0)
        for (var i = 1; i < rows.length; i++) {
            var eventType = rows[i].cells[0].getElementsByTagName('select')[0].value;
            var startTime = rows[i].cells[1].getElementsByTagName('input')[0].value;
            var endTime = rows[i].cells[2].getElementsByTagName('input')[0].value;
            // Event Seq is now select
            var eventSeq = rows[i].cells[3].getElementsByTagName('select')[0].value;
            var highSpeed = rows[i].cells[4].getElementsByTagName('select')[0].value;
            var location = rows[i].cells[5].getElementsByTagName('input')[0].value;
            var t1Event = rows[i].cells[6].getElementsByTagName('input')[0].value;

            data.push({
                eventType: eventType,
                startTime: startTime,
                endTime: endTime,
                eventSeq: eventSeq,
                highSpeed: highSpeed,
                location: location,
                t1Event: t1Event
            });
        }
        try {
            localStorage.setItem('eventLog_' + window.location.pathname, JSON.stringify(data));
        } catch (e) {
            console.warn("LocalStorage not available:", e);
        }
    }

    function loadData() {
        try {
            // Load Observer Name
            var obsName = localStorage.getItem('T1_check_ObserverName'); // Load from global key
            if (obsName) {
                var obsInput = document.getElementById('observerName');
                if (obsInput) obsInput.value = obsName;
            }
            var flat = localStorage.getItem('T1_check_FlatFrame');
            if (flat) {
                 var ffInput = document.getElementById('flatFrame');
                 if (ffInput) ffInput.value = flat;
            }

            var stored = localStorage.getItem('eventLog_' + window.location.pathname);
            if (stored) {
                var data = JSON.parse(stored);
                var table = document.getElementById('logTable').getElementsByTagName('tbody')[0];
                table.innerHTML = "";
                
                for (var i = 0; i < data.length; i++) {
                    var newRow = table.insertRow();
                    var cell1 = newRow.insertCell(0);
                    var cell2 = newRow.insertCell(1);
                    var cell3 = newRow.insertCell(2);
                    var cell4 = newRow.insertCell(3);
                    var cell5 = newRow.insertCell(4);
                    var cell6 = newRow.insertCell(5);
                    var cell7 = newRow.insertCell(6);
                    var cell8 = newRow.insertCell(7);

                    // Event Type
                    var eventType = data[i].eventType || "";
                    var eventOpts = ["Doppler shift", "Ejection", "Filament activity", "Filament disapearance", "Filament eruption", "Flare", "H-alpha brightening", "Prominence activity", "Prominence eruption"];
                    var eventSelect = '<select onchange="saveData()" style="font-size: 0.9em;"><option value="">Select...</option>';
                    for (var j = 0; j < eventOpts.length; j++) {
                        eventSelect += '<option value="' + eventOpts[j] + '"' + (eventType === eventOpts[j] ? ' selected' : '') + '>' + eventOpts[j] + '</option>';
                    }
                    eventSelect += '</select>';
                    cell1.innerHTML = eventSelect;

                    // Start Time
                    cell2.innerHTML = '<input type="text" placeholder="Start time" style="width:70px; font-size: 0.9em;" value="' + (data[i].startTime || "") + '" oninput="saveData()"> <button onclick="setTime(this)" style="font-size:0.8em; padding:2px;">Set</button>';
                    
                    // End Time
                    cell3.innerHTML = '<input type="text" placeholder="End time" style="width:70px; font-size: 0.9em;" value="' + (data[i].endTime || "") + '" oninput="saveData()"> <button onclick="setTime(this)" style="font-size:0.8em; padding:2px;">Set</button>';

                    // Event Seq - Dropdown
                    var eventSeq = data[i].eventSeq || "";
                    var seqOptsSorted = [
                        {val: "A", text: "After (A)"},
                        {val: "BA", text: "Befor after (BA)"},
                        {val: "B", text: "Before (B)"},
                        {val: "BI", text: "Before interm. (BI)"},
                        {val: "BIA", text: "Before interm. after (BIA)"},
                        {val: "F", text: "Full (F)"},
                        {val: "FI", text: "Full interm. (FI)"},
                        {val: "IA", text: "Interm. after (IA)"}
                    ];
                    var seqSelect = '<select onchange="saveData()" style="font-size: 0.9em; width: 100%;"><option value="">Select...</option>';
                    for (var k = 0; k < seqOptsSorted.length; k++) {
                        seqSelect += '<option value="' + seqOptsSorted[k].val + '"' + (eventSeq === seqOptsSorted[k].val ? ' selected' : '') + '>' + seqOptsSorted[k].text + '</option>';
                    }
                    seqSelect += '</select>';
                    cell4.innerHTML = seqSelect;

                    // High Speed
                    var highSpeed = data[i].highSpeed || "";
                    var speedSelect = '<select onchange="saveData()" style="font-size: 0.9em;"><option value="">Select...</option>';
                    speedSelect += '<option value="Yes"' + (highSpeed === 'Yes' ? ' selected' : '') + '>Yes</option>';
                    speedSelect += '<option value="No"' + (highSpeed === 'No' ? ' selected' : '') + '>No</option></select>';
                    cell5.innerHTML = speedSelect;
                    
                    // Location
                    cell6.innerHTML = '<input type="text" placeholder="Loc" style="width:100%; font-size: 0.9em;" value="' + (data[i].location || "") + '" oninput="saveData()">';

                    // T1 Event
                    cell7.innerHTML = '<input type="text" placeholder="Enter T1 event..." style="width:100%; font-size: 0.9em;" value="' + (data[i].t1Event || data[i].notes || "") + '" oninput="saveData()">';

                    // Action
                    cell8.innerHTML = '<button onclick="deleteRow(this)" style="font-size: 0.9em;">Delete</button>';
                }
            }
        } catch (e) {
            console.warn("Cannot load from LocalStorage:", e);
        }
    }
    
    function cleanLog() {
        if (confirm("Are you sure you want to delete all entries from the log? This cannot be undone.")) {
            var tableBody = document.getElementById('logTable').getElementsByTagName('tbody')[0];
            tableBody.innerHTML = "";
            localStorage.removeItem('eventLog_' + window.location.pathname);
        }
    }

    function downloadCSV() {
        var table = document.getElementById('logTable');
        var rows = table.rows;
        var observer = document.getElementById('observerName').value;
        var flatframe = document.getElementById('flatFrame').value;
        
        var csvContent = "data:text/csv;charset=utf-8,Observer: " + observer + ",Flat frame: " + flatframe + "\n";
        csvContent += "Event Type,Start Time,End Time,Event Sequence,High Speed,Location,T1 Event\n";

        for (var i = 1; i < rows.length; i++) { // Skip header
            var eventType = rows[i].cells[0].getElementsByTagName('select')[0].value;
            var startTime = rows[i].cells[1].getElementsByTagName('input')[0].value;
            var endTime = rows[i].cells[2].getElementsByTagName('input')[0].value;
            // Event Seq is now select
            var eventSeq = rows[i].cells[3].getElementsByTagName('select')[0].value;
            var highSpeed = rows[i].cells[4].getElementsByTagName('select')[0].value;
            var location = rows[i].cells[5].getElementsByTagName('input')[0].value;
            var t1Event = rows[i].cells[6].getElementsByTagName('input')[0].value;

            var rowData = [eventType, startTime, endTime, eventSeq, highSpeed, location, t1Event];
            // Escape commas in data and join
            csvContent += rowData.map(val => val.replace(/,/g, " ")).join(",") + "\n"; 
        }
        
        var encodedUri = encodeURI(csvContent);
        var link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "image_log.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Preload images
    function preloadImages() {
        for (var i = 0; i < 50; i++) {
            aniFrames[i] = new Image();
            aniFrames[i].src = imageFiles[i];
        }
    }
    
    function toggleDarkMode() {
        var body = document.body;
        body.classList.toggle("dark-mode");
        var isDark = body.classList.contains("dark-mode");
        localStorage.setItem("darkMode", isDark);
        updateThemeButton(isDark);
    }

    function loadTheme() {
        var isDark = localStorage.getItem("darkMode") === "true";
        if (isDark) {
            document.body.classList.add("dark-mode");
        }
        updateThemeButton(isDark);
    }

    function updateThemeButton(isDark) {
        var btn = document.getElementById("themeBtn");
        if (btn) {
            btn.innerHTML = isDark ? "Light Mode" : "Dark Mode";
        }
    }
    </script>
        <style>

            #logTable th { background-color: #f2f2f2; position: sticky; top: 0; z-index: 10; font-size: 0.9em; }
            #logControls { margin-top: 20px; text-align: center; }

            body.dark-mode #logContainer { border-color: #444; }
            body.dark-mode #logTable th { background-color: #222; color: #fff; border-color: #444; }
            body.dark-mode #logTable td { border-color: #444; }
            body.dark-mode input, body.dark-mode select { background-color: #333; color: #fff; border: 1px solid #555; }
        </style>

    <body onload="preloadImages(); startAnimate(); loadData(); loadTheme();">
        <h2>
            Observation: "26-03-12"
        </h2>
        
        <div class="zoom-control">
            Zoom out (-) 
            <input type="range" id="zoomSlider" min="10" max="200" value="100" oninput="changeZoom(this.value)"> 
            Zoom in (+) 
            <span id="zoomDisplay" style="display:inline-block; width:40px;">100%</span>
            <button onclick="resetZoom()">Reset Zoom</button>
            <button id="themeBtn" onclick="toggleDarkMode()" style="font-size: 12px; margin-left: 10px; padding: 4px 8px;">Dark Mode</button>
        </div>
        
        <img name="imageWindow" src="260312T000820_dif.jpg" alt="Image sequence animation" style="width: 100%; max-width: none;">
        
        <div class="controls">
            <span id="frameCounter">50 frames (100ms), 1/50</span>
            <br><br>
            <button onclick="startAnimate()">Play</button>
            <button onclick="killAnimate()">Stop</button>
            <button onclick="stepPrev()">Previous</button>
            <button onclick="stepNext()">Next</button>
            <button onclick="speedUp()">Faster</button>
            <button onclick="slowDown()">Slower</button>
            <button onclick="reloadPage()">Reload</button>
        </div>

        <div id="logSection">
            <h3>SMART T1 Event list</h3>
            <div id="logControls">
                 <button onclick="addLogEntry()">Add new event</button>
                 <button onclick="cleanLog()">Clean Log Chart</button>
                 <button onclick="downloadCSV()">Download Log as CSV</button>
            </div>
            
            <div id="logContainer">
            <table id="logTable">
                <thead>
                    <tr>
                        <th style="width: 10%">Event Type</th>
                        <th style="width: 15%">Start Time</th>
                        <th style="width: 15%">End Time</th>
                        <th style="width: 5%">Event Seq</th>
                        <th style="width: 8%">High Speed</th>
                        <th style="width: 15%">Location</th>
                        <th style="width: 25%">T1 Event</th>
                <tbody>
                </tbody>
            </table>
            </div>
            
            <div style="margin-top: 10px; text-align: left;">
                <label for="observerName" style="font-weight: bold;">Observer: </label>
                <input type="text" id="observerName" oninput="saveObserver()" placeholder="Enter Name" style="width: 200px;">
                
                <label for="flatFrame" style="font-weight: bold; margin-left: 20px;">Flat frame: </label>
                <input type="text" id="flatFrame" oninput="saveObserver()" placeholder="yyMMddThhmmss" style="width: 200px;">
                <button onclick="setFlatFrameTime()" style="font-size: 0.9em; padding: 2px 5px;">Set time</button>
            </div>
        </div>
    </body>
    </html>
